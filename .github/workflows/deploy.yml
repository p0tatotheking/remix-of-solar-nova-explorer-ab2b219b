name: Deploy to S3
'on':
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use your preferred version

      - name: Install dependencies
        run: npm ci # Uses package-lock.json for a clean install

      - name: Build project
        run: npm run build # Compiles your code into a /dist or /build folder

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Sync build folder to S3
        run: |
          # Only sync the 'dist' folder created by 'npm run build'
          aws s3 sync ./dist s3://solarnova-novasolar-s3 --delete

          # This fixes the 'binary/octet-stream' error by forcing the correct header
          aws s3 cp s3://solarnova-novasolar-s3 s3://solarnova-novasolar-s3 \
            --exclude "*" --include "*.js" --recursive \
            --metadata-directive REPLACE --content-type "application/javascript"
