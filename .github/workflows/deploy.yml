name: Build and Deploy to S3
on:
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          # This injects your secrets into the Vite build process
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Change if your bucket is in a different region

      - name: Sync build folder to S3
        run: |
          # 1. Sync the 'dist' folder created by Vite
          aws s3 sync ./dist s3://solarnova-novasolar-s3 --delete

          # 2. Force the correct MIME type for all JS files to fix the 'binary' error
          aws s3 cp s3://solarnova-novasolar-s3 s3://solarnova-novasolar-s3 \
            --exclude "*" --include "*.js" --recursive \
            --metadata-directive REPLACE --content-type "application/javascript"
