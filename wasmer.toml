[package]
name = "solarnova"
version = "1.0.0"
description = "SolarNova - Games, Chat & Music Platform"

[fs]
"/public" = "dist"

[[module]]
name = "static-web-server"
source = "wasmer/static-web-server"

[[command]]
name = "serve"
module = "static-web-server"
runner = "https://webc.org/runner/wasi"

[command.annotations.wasi]
main-args = ["-w", "/public", "-p", "8080", "--page-fallback", "/public/index.html"]
